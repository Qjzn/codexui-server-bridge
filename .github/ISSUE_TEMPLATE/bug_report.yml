name: Bug 报告
description: Web 端、安装、同步、手机访问或服务稳定性问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量不要填写密码、Token、Cookie、真实公网地址或私人目录。

  - type: textarea
    id: problem
    attributes:
      label: 问题现象
      description: 说明你看到的问题，以及它对使用造成的影响。
      placeholder: 例如：手机端打开线程后一直显示思考中，刷新页面后才看到回复。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 写出最短复现路径。
      placeholder: |
        1. 启动 7420 服务
        2. 手机浏览器打开页面
        3. 进入某个线程并发送消息
        4. 页面卡在某个状态
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 运行平台
      options:
        - Windows
        - Windows Server
        - Linux
        - macOS
        - Android / Termux
        - 其他
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 项目版本
      description: 可填写 Release 版本、Git commit，或页面设置里看到的版本信息。
      placeholder: v0.2.0-bridge.3

  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 只粘贴与问题相关的片段，并先脱敏。
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已确认内容中不包含密码、Token、Cookie、私有 IP 或个人目录。
          required: true
        - label: 我已尝试刷新页面或重启服务，问题仍存在。
          required: false
