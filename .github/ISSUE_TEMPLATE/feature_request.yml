name: 功能建议
description: 提出新能力、交互优化或部署改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: need
    attributes:
      label: 你想解决什么问题
      description: 先说明真实使用场景，而不是只描述按钮或技术方案。
      placeholder: 例如：我希望普通用户不用配置端口映射，也能从手机安全访问家里电脑上的 Codex。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 描述你希望怎么使用它。
      placeholder: 例如：提供 Cloudflare Tunnel 一键模式，安装后输出一个访问地址。
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 相关模块
      options:
        - 安装部署
        - 手机端体验
        - 会话同步
        - 文件 / 图片
        - 命令执行 / 权限确认
        - UI / UX
        - 文档
        - 其他
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你试过的替代方案
      description: 如果没有可以留空。

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已确认这个建议不依赖私人账号、私有服务或未脱敏凭据。
          required: true
