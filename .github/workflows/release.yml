name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_DEFAULT_SERVER_URL: ${{ secrets.ANDROID_DEFAULT_SERVER_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Package release bundle
        shell: pwsh
        run: |
          ./scripts/package-release.ps1 `
            -Version "${env:GITHUB_REF_NAME}" `
            -OutputDir "${env:RUNNER_TEMP}\release"

      - name: Set up Java 24 for Android
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: Set up Android SDK
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        uses: android-actions/setup-android@v3

      - name: Install Android build packages
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: pwsh
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Prepare Android signing files
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: pwsh
        run: |
          $keystoreDir = Join-Path $env:RUNNER_TEMP 'android-signing'
          New-Item -ItemType Directory -Force -Path $keystoreDir | Out-Null
          $keystorePath = Join-Path $keystoreDir 'cx-codex-release.jks'
          [System.IO.File]::WriteAllBytes($keystorePath, [Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64))
          @"
          storeFile=$keystorePath
          storePassword=$env:ANDROID_KEYSTORE_PASSWORD
          keyAlias=$env:ANDROID_KEY_ALIAS
          keyPassword=$env:ANDROID_KEY_PASSWORD
          "@ | Set-Content -Path "android/keystore.properties" -Encoding UTF8

      - name: Sync Android shell
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: pwsh
        env:
          CAP_SERVER_URL: ${{ env.ANDROID_DEFAULT_SERVER_URL }}
        run: npm run mobile:android:sync

      - name: Build Android release APK
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: pwsh
        env:
          APP_VERSION_NAME: ${{ github.ref_name }}
          APP_VERSION_CODE: ${{ github.run_number }}
        run: |
          Push-Location android
          .\gradlew.bat assembleRelease
          Pop-Location

      - name: Collect Android release artifacts
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: pwsh
        run: |
          $outputDir = Join-Path $env:RUNNER_TEMP 'release'
          $apkSource = "android/app/build/outputs/apk/release/app-release.apk"
          $apkTarget = Join-Path $outputDir "cx-codex-android-${env:GITHUB_REF_NAME}.apk"
          Copy-Item $apkSource $apkTarget -Force
          $hash = (Get-FileHash -Algorithm SHA256 $apkTarget).Hash.ToLowerInvariant()
          Set-Content -Path ($apkTarget + '.sha256') -Value "$hash  $(Split-Path -Leaf $apkTarget)" -Encoding ASCII

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/release-body.md
          files: |
            ${{ runner.temp }}/release/*.zip
            ${{ runner.temp }}/release/*.sha256
            ${{ runner.temp }}/release/*.apk
